<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Manage Shops</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a2e; }
    .admin-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .shop-row { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 10px; transition: 0.2s; }
    .shop-row:hover { background: #e9ecef; }
    .badge-active { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
    .badge-inactive { background: #dc3545; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
  </style>
</head>
<body class="p-4">

<div id="adminLogin" class="container mt-5" style="max-width: 400px;">
  <div class="card shadow">
    <div class="card-body">
      <h3 class="text-center">Admin Login</h3>
      <input type="email" id="adminEmail" class="form-control mb-2" placeholder="Admin Email">
      <input type="password" id="adminPassword" class="form-control mb-2" placeholder="Password">
      <button class="btn btn-danger w-100" id="loginBtn">Login as Admin</button>
    </div>
  </div>
</div>

<div id="adminDashboard" style="display:none;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white">🏪 Admin Dashboard - Shop Management</h2>
    <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
  </div>
  
  <div class="row">
    <div class="col-md-4">
      <div class="admin-card text-center">
        <h3 id="totalShops">0</h3>
        <p>Total Shops</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="admin-card text-center">
        <h3 id="activeShops">0</h3>
        <p>Active Shops</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="admin-card text-center">
        <h3 id="inactiveShops">0</h3>
        <p>Inactive Shops</p>
      </div>
    </div>
  </div>
  
  <div class="admin-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
  <h4>All Shops</h4>
  <input type="text" id="shopSearch" class="form-control w-50" placeholder="Search by Shop Code">
  <button class="btn btn-primary" id="addShopBtn">+ Add New Shop</button>
</div>
    <div id="shopsList"></div>
  </div>
</div>

<div id="addShopModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
  <div style="background:white; max-width:500px; margin:100px auto; border-radius:12px; padding:20px;">
    <h4>Add New Shop</h4>
        <input type="text" id="newShopId" class="form-control mb-2" placeholder="Shop ID (e.g., FS50001)">
        <input type="text" id="newShopName" class="form-control mb-2" placeholder="Shop Name">
        <input type="email" id="newShopEmail" class="form-control mb-2" placeholder="Shop Email">
        <input type="password" id="newShopPassword" class="form-control mb-2" placeholder="Shop Password">
    <div class="mt-3">
      <button id="closeModalBtn" class="btn btn-secondary">Cancel</button>
      <button id="createShopBtn" class="btn btn-primary">Create Shop</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zkldaxrwwnctadmirsfo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprbGRheHJ3d25jdGFkbWlyc2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDI2MzgsImV4cCI6MjA5MDkxODYzOH0.PEIto8HOY9wIi3tKFuo4H_iUZetcnex1IQlPhUPU-rM';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentAdmin = null;

const adminLoginDiv = document.getElementById('adminLogin');
const adminDashboardDiv = document.getElementById('adminDashboard');
const addShopModal = document.getElementById('addShopModal');

async function adminLogin() {
  const email = document.getElementById('adminEmail').value;
  const password = document.getElementById('adminPassword').value;
  
  if (!email || !password) {
    alert('Enter email and password');
    return;
  }
  
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) {
    alert('Login failed: ' + error.message);
    return;
  }
  
  const { data: adminCheck, error: roleError } = await supabaseClient
    .from('shops')
    .select('role')
    .eq('id', data.user.id)
    .maybeSingle();
  
  if (roleError || !adminCheck || adminCheck.role !== 'admin') {
    await supabaseClient.auth.signOut();
    alert('Access denied. Admin privileges required.');
    return;
  }
  
  currentAdmin = data.user;
  adminLoginDiv.style.display = 'none';
  adminDashboardDiv.style.display = 'block';
  loadShops();
}

let selectedShopId = null;

async function loadShops() {
  const { data: shops, error } = await supabaseClient
    .from('shops')
    .select('*')
    .order('created_at', { ascending: false });
  
  if (error) {
    alert('Error loading shops: ' + error.message);
    return;
  }
  
  if (!shops || shops.length === 0) {
    document.getElementById('shopsList').innerHTML = '<div class="text-muted">No shops found</div>';
    document.getElementById('totalShops').innerText = '0';
    document.getElementById('activeShops').innerText = '0';
    document.getElementById('inactiveShops').innerText = '0';
    return;
  }
  
  const shopAccounts = shops.filter(s => s.role !== 'admin');
  const total = shopAccounts.length;
  const active = shopAccounts.filter(s => s.is_active === true).length;
  const inactive = shopAccounts.filter(s => s.is_active === false).length;
  
  document.getElementById('totalShops').innerText = total;
  document.getElementById('activeShops').innerText = active;
  document.getElementById('inactiveShops').innerText = inactive;
  
  const container = document.getElementById('shopsList');
  container.innerHTML = '';
  
  shopAccounts.forEach(shop => {
  const shopDiv = document.createElement('div');
  shopDiv.className = 'shop-row d-flex justify-content-between align-items-center';
  shopDiv.dataset.shopCode = shop.shop_code; 

  shopDiv.innerHTML = `
    <div>
      <strong>${shop.shop_name || 'Unnamed Shop'} (${shop.shop_code})</strong><br>
      <small class="text-muted">${shop.email}</small><br>
      <small class="text-muted">Password: ${shop.password || 'Not set'}</small>
    </div>
    <div>
      <span class="${shop.is_active ? 'badge-active' : 'badge-inactive'} me-2">${shop.is_active ? 'ACTIVE' : 'INACTIVE'}</span>
      <button class="btn btn-sm btn-warning" onclick="window.toggleShopStatus('${shop.id}', ${!shop.is_active})">
        ${shop.is_active ? 'Deactivate' : 'Activate'}
      </button>
      <button class="btn btn-sm btn-danger ms-2" onclick="window.deleteShop('${shop.id}')">Delete</button>
    </div>
  `;
  container.appendChild(shopDiv);
});
}

window.toggleShopStatus = async function(shopId, newStatus) {
  const { error } = await supabaseClient
    .from('shops')
    .update({ is_active: newStatus })
    .eq('id', shopId);
  
  if (error) {
    alert('Failed to update: ' + error.message);
    return;
  }
  loadShops();
};

window.deleteShop = async function(shopId) {
  if (!confirm('Are you sure? This will delete all orders and menu items for this shop.')) return;
  
  const { error } = await supabaseClient
    .from('shops')
    .delete()
    .eq('id', shopId);
  
  if (error) {
    alert('Failed to delete: ' + error.message);
    return;
  }
  loadShops();
};

async function createShop() {
  const id = document.getElementById('newShopId').value.trim();
  const name = document.getElementById('newShopName').value.trim();
  const email = document.getElementById('newShopEmail').value.trim();
  const password = document.getElementById('newShopPassword').value.trim();
  
  if (!id || !name || !email || !password) {
    alert('All fields including Shop ID are required');
    return;
  }

  const { data, error } = await supabaseClient
  .from('shops')
  .insert([{
    shop_code: id, 
    shop_name: name,
    email: email,
    password: password,
    is_active: true,
    role: 'shop'
  }])
  .select();

  if (error) {
    alert('Shop creation error: ' + error.message);
    return;
  }

  alert(`Shop "${name}" created successfully!\n\nLogin credentials:\nEmail: ${email}\nPassword: ${password}\nShop ID: ${id}`);

  document.getElementById('newShopId').value = '';
  document.getElementById('newShopName').value = '';
  document.getElementById('newShopEmail').value = '';
  document.getElementById('newShopPassword').value = '';
  addShopModal.style.display = 'none';

  loadShops();
}

function adminLogout() {
  supabaseClient.auth.signOut();
  currentAdmin = null;
  adminDashboardDiv.style.display = 'none';
  adminLoginDiv.style.display = 'block';
}

document.getElementById('shopSearch').addEventListener('input', async function() {
  const searchValue = this.value.trim();
  
  if (!searchValue) {
    loadShops();
    return;
  }
  
  const { data: shops, error } = await supabaseClient
    .from('shops')
    .select('*')
    .ilike('shop_code', `%${searchValue}%`)
    .order('created_at', { ascending: false });
  
  if (error) {
    alert('Error searching shops: ' + error.message);
    return;
  }

  const shopAccounts = shops.filter(s => s.role !== 'admin');
  const container = document.getElementById('shopsList');
  container.innerHTML = '';

  if (!shopAccounts.length) {
    container.innerHTML = '<div class="text-muted">No shops found</div>';
    return;
  }

  shopAccounts.forEach(shop => {
    const shopDiv = document.createElement('div');
    shopDiv.className = 'shop-row d-flex justify-content-between align-items-center';
    shopDiv.dataset.shopCode = shop.shop_code;

    shopDiv.innerHTML = `
      <div>
        <strong>${shop.shop_name || 'Unnamed Shop'} (${shop.shop_code})</strong><br>
        <small class="text-muted">${shop.email}</small><br>
        <small class="text-muted">Password: ${shop.password || 'Not set'}</small>
      </div>
      <div>
        <span class="${shop.is_active ? 'badge-active' : 'badge-inactive'} me-2">${shop.is_active ? 'ACTIVE' : 'INACTIVE'}</span>
        <button class="btn btn-sm btn-warning" onclick="window.toggleShopStatus('${shop.id}', ${!shop.is_active})">
          ${shop.is_active ? 'Deactivate' : 'Activate'}
        </button>
        <button class="btn btn-sm btn-danger ms-2" onclick="window.deleteShop('${shop.id}')">Delete</button>
      </div>
    `;
    container.appendChild(shopDiv);
  });
});

document.getElementById('loginBtn').addEventListener('click', adminLogin);
document.getElementById('logoutBtn').addEventListener('click', adminLogout);
document.getElementById('addShopBtn').addEventListener('click', () => {
  addShopModal.style.display = 'block';
});
document.getElementById('closeModalBtn').addEventListener('click', () => {
  addShopModal.style.display = 'none';
});
document.getElementById('createShopBtn').addEventListener('click', createShop);

window.addEventListener('click', (e) => {
  if (e.target === addShopModal) {
    addShopModal.style.display = 'none';
  }
});

adminLoginDiv.style.display = 'block';
</script>
</body>
</html>
